name: Update README cards

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Generate stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true&theme=catppuccin_latte&border_radius=0&bg_color=00000000&hide_border=true
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate top langs card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&theme=catppuccin_latte&border_radius=0&bg_color=00000000&hide_border=true
          path: profile/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Combine cards into single SVG
        run: |
          get_attr() { grep -oP "(?<=$1=\")[^\"]*" "$2" | head -1; }
          sw=$(get_attr width profile/stats.svg)
          sh=$(get_attr height profile/stats.svg)
          lw=$(get_attr width profile/top-langs.svg)
          lh=$(get_attr height profile/top-langs.svg)
          gap=16
          tw=$((sw + gap + lw))
          th=$((sh > lh ? sh : lh))
          lx=$((sw + gap))
          stats=$(sed '/<\?xml/d' profile/stats.svg)
          langs=$(sed '/<\?xml/d' profile/top-langs.svg)
          cat > profile/combined.svg << SVGEOF
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${tw} ${th}">
            <style>
              @media (prefers-color-scheme: dark) {
                .stat, .lang-name, .not_bold, .bold { fill: #ffffff !important; }
                .header { fill: #40c9d2 !important; }
                .icon { fill: #c5a3ff !important; }
                .rank-text { fill: #ffffff !important; }
                .rank-circle-rim { stroke: #40c9d2 !important; }
                .rank-circle { stroke: #40c9d2 !important; }
              }
            </style>
            <svg x="0" y="0" width="${sw}" height="${sh}">${stats}</svg>
            <svg x="${lx}" y="0" width="${lw}" height="${lh}">${langs}</svg>
          </svg>
          SVGEOF

      - name: Commit cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "Update README cards" || exit 0
          git push
