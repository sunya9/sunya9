name: Update README cards

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Generate stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true&theme=catppuccin_latte&border_radius=0&bg_color=transparent&hide_border=true
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate top langs card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&theme=catppuccin_latte&border_radius=0&bg_color=transparent&hide_border=true
          path: profile/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Combine cards into single SVG
        run: |
          stats=$(sed '/<\?xml/d' profile/stats.svg)
          langs=$(sed '/<\?xml/d' profile/top-langs.svg)
          cat > profile/combined.svg << SVGEOF
          <svg xmlns="http://www.w3.org/2000/svg" width="900" height="200">
            <svg x="0" y="0" width="450" height="200">${stats}</svg>
            <svg x="450" y="0" width="450" height="200">${langs}</svg>
          </svg>
          SVGEOF

      - name: Commit cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "Update README cards" || exit 0
          git push
